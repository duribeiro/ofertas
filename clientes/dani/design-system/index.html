<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Design System — Dani Mentoria Tributária</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap');
    
    :root {
      --bg: #f8f9fa;
      --text: #111827;
      --text-secondary: #4b5563;
      --brand: #1b4d3c;
      --accent: #d4af37;
      --border: rgba(0,0,0,0.08);
    }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-image: 
        linear-gradient(to right, rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      color: var(--text);
    }

    h1 { font-size: 2.5rem; color: var(--brand); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
    h2 { font-size: 1.8rem; margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    h3 { font-size: 1.4rem; color: var(--brand); margin-top: 1.5rem; }
    
    p { color: var(--text-secondary); margin-bottom: 1rem; }
    
    code {
      background: rgba(0,0,0,0.04);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.9em;
      color: var(--brand);
    }

    pre {
      background: #111827;
      color: #fff;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }
    
    pre code {
      background: transparent;
      color: inherit;
    }

    blockquote {
      border-left: 4px solid var(--accent);
      margin: 0;
      padding: 10px 20px;
      background: rgba(212, 175, 55, 0.1);
      border-radius: 0 8px 8px 0;
      color: var(--brand);
      font-style: italic;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }
    
    th, td {
      border: 1px solid var(--border);
      padding: 12px;
      text-align: left;
    }
    
    th {
      background: rgba(27, 77, 60, 0.05);
      color: var(--brand);
    }
  </style>
</head>
<body>
  <div class="container" id="content">
    Carregando Design System...
  </div>

  <script>
    fetch('design-system.md')
      .then(response => response.text())
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      });
  </script>
</body>
</html>
